name: Repo Sync

on:
  push:
    branches:
      - main

jobs:
  git-sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Push to Second Repo
        run: |
          git remote add destination https://${{ secrets.SYNC_TOKEN }}@github.com/Evim-Ceyiz/Evim-Ceyiz-.git
          git push -f destination main
